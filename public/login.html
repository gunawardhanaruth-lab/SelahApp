<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Selah</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">Selah<span>.</span></a>
    </header>

    <main class="auth-page">
        <div class="auth-card login-accent">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter the sanctuary to resume your journey.</p>
            </div>

            <form id="loginForm" class="auth-form" autocomplete="off">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" 
                           autocomplete="off" readonly onfocus="this.removeAttribute('readonly');" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" 
                           autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Enter Sanctuary</button>
            </form>

            <div class="auth-footer">
                <p>New here? <a href="register.html">Create an account</a></p>
                <p style="margin-top: 1rem;"><a href="index.html" style="font-size: 0.8rem; color: var(--text-muted);">← Return Home</a></p>
            </div>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button');
                    const originalText = btn.innerText;
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    if (!email || !password) {
                        alert('Please enter your credentials');
                        return;
                    }

                    // Loading State
                    btn.innerText = 'Opening Gates...';
                    btn.disabled = true;
                    btn.style.opacity = '0.7';

                    try {
                        console.log('Attempting login for:', email);
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        const data = await res.json();
                        if (res.ok) {
                            console.log('Login Success:', data);
                            if (data.role === 'admin') {
                                window.location.href = 'admin.html';
                            } else {
                                window.location.href = 'moods.html';
                            }
                        } else {
                            alert(data.error || 'Invalid credentials');
                            btn.innerText = originalText;
                            btn.disabled = false;
                            btn.style.opacity = '1';
                        }
                    } catch (err) {
                        console.error('Login Error:', err);
                        alert('Connection error. Please try again.');
                        btn.innerText = originalText;
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }
                });
            </script>
        </div>
    </main>
</body>

</html>
